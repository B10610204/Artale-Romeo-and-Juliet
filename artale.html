<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Artale羅密歐與茱麗葉組隊任務</title>
<style>
body {
  background:#111;
  color:white;
  font-family:Arial, sans-serif;
  margin:0;
  padding:0;
  text-align:center;
}

h2 {
  margin-top:20px;
}

/* 整個格子區 */
.container {
  display:flex;
  flex-direction:column-reverse; /* 第1台階在最下面 */
  gap:8px;
  margin:20px auto;
  max-width:400px; /* 調整整個格子區寬度 */
}

/* 每列：左台階 + 4格 */
.row {
  display:flex;
  align-items:center; /* 高度統一 */
  gap:8px;
}

/* 左側台階 */
.row-number {
  width:80px;
  text-align:right;
}

/* 右側格子容器 */
.cells {
  display:flex;
  flex:1;
  gap:8px;
}

/* 單格 */
.cell {
  flex:1;
  aspect-ratio:1/1; /* 正方形 */
  background:#333;
  border-radius:8px;
  cursor:pointer;
}

/* 控制面板 */
.control {
  display:flex;
  justify-content:center; /* 水平置中 */
  flex-wrap:wrap;
  gap:10px;
  margin:20px;
}

.control button {
  width:50px;
  height:50px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  flex-shrink:0;
}

/* 清空按鈕置中 */
#clearAll {
  margin:20px auto;
  display:block;
  padding:8px 20px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

/* 手機版縮小 */
@media(max-width:500px) {
  .container {
    max-width:90vw;
  }
  .row-number {
    width:60px;
    font-size:12px;
  }
  .cell {
    font-size:10px;
  }
  .control button {
    width:40px;
    height:40px;
  }
}
</style>
</head>
<body>

<h2>Artale羅密歐與茱麗葉組隊任務</h2>

<div class="container" id="container"></div>

<div class="control">
  <button style="background:red" data-color="red"></button>
  <button style="background:blue" data-color="blue"></button>
  <button style="background:green" data-color="green"></button>
  <button style="background:purple" data-color="purple"></button>
  <button style="background:white" data-color=""></button> <!-- 清空格子 -->
</div>

<button id="clearAll">🧹 清空全部</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

// 🔴 Firebase 設定
const firebaseConfig = {
  apiKey: "AIzaSyBAs8oRMsuCePNxSoes4X-MLXbLuqr0P7w",
  authDomain: "artale-romeo-and-juliet.firebaseapp.com",
  databaseURL: "https://artale-romeo-and-juliet-default-rtdb.firebaseio.com",
  projectId: "artale-romeo-and-juliet"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let selectedColor = "red";

const container = document.getElementById("container");
const cellRefs = [];

// 建立 10 列，每列 4 格
for (let row = 1; row <= 10; row++) {
  const rowDiv = document.createElement("div");
  rowDiv.className = "row";

  const rowNumber = document.createElement("div");
  rowNumber.className = "row-number";
  rowNumber.innerText = `第${row}台階`;
  rowDiv.appendChild(rowNumber);

  const cellsDiv = document.createElement("div");
  cellsDiv.className = "cells";

  for (let col = 0; col < 4; col++) {
    const idx = (10 - row) * 4 + col;
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.id = "cell_" + idx;

    cell.onclick = () => {
      if (selectedColor === "") {
        remove(ref(db, "grid/" + idx));
      } else {
        set(ref(db, "grid/" + idx), {
          color: selectedColor
        });
      }
    };

    cellsDiv.appendChild(cell);
    cellRefs.push(cell);
  }

  rowDiv.appendChild(cellsDiv);
  container.appendChild(rowDiv);
}

// 選顏色
document.querySelectorAll(".control button").forEach(btn => {
  btn.onclick = () => {
    selectedColor = btn.dataset.color;
  };
});

// 同步
onValue(ref(db, "grid"), (snapshot) => {
  const data = snapshot.val() || {};
  cellRefs.forEach(c => {
    c.style.background = "#333";
  });
  for (let i in data) {
    const cell = document.getElementById("cell_" + i);
    if (cell) {
      cell.style.background = data[i].color;
    }
  }
});

// 清空全部
document.getElementById("clearAll").onclick = () => {
  remove(ref(db, "grid"));
};
</script>

</body>
</html>
