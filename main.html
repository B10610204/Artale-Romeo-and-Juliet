<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>同步格子工具</title>

<style>
body {
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

.grid {
  display:grid;
  grid-template-columns: repeat(6, 60px);
  gap:10px;
  justify-content:center;
  margin:20px;
}

.cell {
  width:60px;
  height:60px;
  background:#333;
  border-radius:8px;
  cursor:pointer;
}

.color-btn {
  width:40px;
  height:40px;
  border:none;
  margin:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>同步標記工具</h2>

<div class="grid" id="grid"></div>

<div>
  <button class="color-btn" style="background:red" data-color="red"></button>
  <button class="color-btn" style="background:blue" data-color="blue"></button>
  <button class="color-btn" style="background:green" data-color="green"></button>
  <button class="color-btn" style="background:yellow" data-color="yellow"></button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

// ✅ 你的 config（已幫你放進來）
const firebaseConfig = {
  apiKey: "AIzaSyBAs8oRMsuCePNxSoes4X-MLXbLuqr0P7w",
  authDomain: "artale-romeo-and-juliet.firebaseapp.com",
  databaseURL: "https://artale-romeo-and-juliet-default-rtdb.firebaseio.com",
  projectId: "artale-romeo-and-juliet",
  storageBucket: "artale-romeo-and-juliet.firebasestorage.app",
  messagingSenderId: "233828408802",
  appId: "1:233828408802:web:b604d7bc80e90dde19adbb"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let selectedColor = "red";

// 建立格子
const grid = document.getElementById("grid");
for (let i = 0; i < 24; i++) {
  const cell = document.createElement("div");
  cell.className = "cell";
  cell.id = "cell_" + i;

  cell.onclick = () => {
    set(ref(db, "grid/" + i), selectedColor);
  };

  grid.appendChild(cell);
}

// 選顏色
document.querySelectorAll(".color-btn").forEach(btn => {
  btn.onclick = () => {
    selectedColor = btn.dataset.color;
  };
});

// 🔥 同步（核心）
onValue(ref(db, "grid"), (snapshot) => {
  const data = snapshot.val() || {};
  for (let i in data) {
    const cell = document.getElementById("cell_" + i);
    if (cell) {
      cell.style.background = data[i];
    }
  }
});
</script>

</body>
</html>
